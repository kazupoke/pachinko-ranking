name: Update Ranking

on:
  schedule:
    # 毎日 午前7時(JST) = 22:00 UTC(前日)
    - cron: '0 22 * * *'
  workflow_dispatch: # 手動実行も可能

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install curl_cffi beautifulsoup4

      - name: Run scraper
        run: python scripts/scrape_ranking.py
        timeout-minutes: 30

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/map.html
          git diff --staged --quiet || git commit -m "ランキング更新: $(date +'%Y/%m/%d %H:%M' -d '+9 hours')"
          git push
