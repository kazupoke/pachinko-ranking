<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>パチンコ店ランキング</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Hiragino Sans', 'Meiryo', sans-serif;
    background: #1a1a2e;
    color: #eee;
    padding: 12px;
    max-width: 600px;
    margin: 0 auto;
  }
  h1 {
    text-align: center;
    font-size: 18px;
    padding: 12px 0;
    border-bottom: 2px solid #e94560;
    margin-bottom: 8px;
  }
  .updated {
    text-align: center;
    font-size: 11px;
    color: #888;
    margin-bottom: 16px;
  }
  .section {
    margin-bottom: 20px;
  }
  h2 {
    font-size: 16px;
    padding: 8px 12px;
    background: #16213e;
    border-left: 4px solid #e94560;
    border-radius: 4px;
    margin-bottom: 8px;
  }
  .no-data {
    padding: 12px;
    color: #666;
    text-align: center;
  }
  .entry {
    display: flex;
    align-items: center;
    padding: 10px 8px;
    border-bottom: 1px solid #2a2a4a;
    gap: 10px;
  }
  .rank-num {
    font-size: 18px;
    font-weight: bold;
    color: #e94560;
    min-width: 32px;
  }
  .score {
    font-size: 22px;
    font-weight: bold;
    color: #ffd700;
    min-width: 50px;
    text-align: right;
  }
  .details {
    flex: 1;
    min-width: 0;
  }
  .rank-badge {
    display: inline-block;
    color: #fff;
    font-weight: bold;
    font-size: 11px;
    padding: 1px 6px;
    border-radius: 3px;
    margin-right: 4px;
  }
  .store {
    font-size: 14px;
    font-weight: bold;
  }
  .event {
    font-size: 12px;
    color: #aaa;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
</style>
</head>
<body>
  <h1>パチンコ店ランキング</h1>
